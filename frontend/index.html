<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="utf-8">
		<title>Les Bonnes Pièces</title>
		<link rel="stylesheet" href="styles.css">
		<link rel="icon" href="data:,">
		<script type="module" src="./pieces.js" defer></script>
		<script src="node_modules/chart.js/dist/chart.umd.min.js" defer></script>
		<!-- <script>
			const myChart = new Chart(ctx, {});
		</script> -->
	</head>
	<body>
		<header>
			<img src="images/logo-les-bonnes-pieces.png" alt="LOGO">
			<h1>Les Bonnes Pièces</h1>
		</header>
		<main>
			<!-- Menu de recherche -->
			<section class="filtres">
				<h3>Filtres</h3>
				<button class="btn-trier">Trier par prix croissant</button>
				<br>
				<button class="btn-filtrer">Filtrer les pièces non abordables</button>
				<br>
				<button class="btn-desc">Filtrer les pièces decrites</button>
				<br>
				<button class="btn-trier-decroissant">Trier par prix decroissant</button>
				<br>
				<p>Prix Maximum :</p>
				<input type="range" id="prixMax" min="0" max="60" step="5">
				<br>
				<h3>Ajouter un avis</h3>
				<form class="formulaire-avis">
					Identifiant de la pièce :<br>
					<input type="number" name="piece_id"><br>
					Nom d'utilisateur :<br>
					<input type="text" name="utilisateur"><br>
					Avis :<br>
					<input type="text" name="commentaire"><br>
					<button>Envoyer</button>
					<br>
					Notes : <br>
					<input type="number" name="nbEtoiles">
				</form>
				<!-- bouton MAJ -->
				<h3>Données</h3>
				<button class="btn-maj">Mettre à jour les pièces</button>

				<!-- charts.js -->
				<h3>Aperçu des avis</h3>
				<canvas id="graphique-avis" width="300" height="300"></canvas>
			</section>

			<!-- Fiches produits -->
			<section class="fiches">
				<div class="abordables">					
				</div>
				<div class="disponibles">
				</div>
			</section>
		</main>
	</body>
</html>
